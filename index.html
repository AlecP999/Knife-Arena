<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNIFE ARENA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;cursor:none}
canvas{display:block}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;pointer-events:none;z-index:100;display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,60,60,0.9)}
#crosshair::before{width:2px;height:24px;left:11px;top:0}
#crosshair::after{width:24px;height:2px;top:11px;left:0}
#crosshair .dot{position:absolute;width:4px;height:4px;background:#ff3c3c;border-radius:50%;top:10px;left:10px}
#hud{position:fixed;bottom:0;left:0;right:0;height:90px;background:linear-gradient(transparent,rgba(0,0,0,0.85));display:none;z-index:50;padding:0 40px;font-family:'Orbitron',sans-serif}
#health-bar-container{position:absolute;bottom:25px;left:40px;width:280px;height:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,60,60,0.3)}
#health-bar{height:100%;width:100%;background:linear-gradient(90deg,#ff1a1a,#ff4444);transition:width 0.3s ease}
#health-text{position:absolute;bottom:38px;left:40px;color:#ff3c3c;font-size:14px;letter-spacing:3px}
#backstab-cd-container{position:absolute;bottom:55px;left:40px;width:140px;height:5px;background:rgba(255,255,255,0.06);border:1px solid rgba(180,60,255,0.2)}
#backstab-cd-bar{height:100%;width:100%;background:linear-gradient(90deg,#aa44ff,#dd66ff);transition:width 0.1s linear}
#backstab-cd-label{position:absolute;bottom:64px;left:40px;color:rgba(180,120,255,0.6);font-size:9px;letter-spacing:3px;font-family:'Orbitron',sans-serif}
#kill-feed{position:fixed;top:20px;right:20px;z-index:50;display:none;text-align:right}
.kill-msg{color:#fff;font-size:14px;font-family:'Rajdhani',sans-serif;padding:4px 12px;margin-bottom:4px;background:rgba(0,0,0,0.5);border-right:3px solid #ff3c3c;animation:killFade 3s forwards;white-space:nowrap}
.kill-msg .backstab{color:#ff3c3c;font-weight:700}
@keyframes killFade{0%,70%{opacity:1}100%{opacity:0}}
#score-display{position:absolute;bottom:25px;right:40px;color:#fff;font-size:28px;font-family:'Orbitron',sans-serif;letter-spacing:2px}
#score-label{position:absolute;bottom:58px;right:40px;color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:4px;font-family:'Orbitron',sans-serif}
#weapon-name{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:5px}
#damage-overlay{position:fixed;inset:0;pointer-events:none;z-index:40;border:0px solid rgba(255,0,0,0);transition:border 0.1s ease}
#slide-indicator{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);color:rgba(100,200,255,0.8);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;opacity:0;z-index:100;pointer-events:none;text-shadow:0 0 8px rgba(100,200,255,0.4);transition:opacity 0.15s;display:none}
#menu{position:fixed;inset:0;z-index:200;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default}
#menu-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,20,20,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(255,60,60,0.05) 0%,transparent 60%)}
#menu-content{position:relative;z-index:1;text-align:center}
#menu h1{font-family:'Orbitron',sans-serif;font-size:72px;font-weight:900;color:#fff;letter-spacing:12px;margin-bottom:8px;text-shadow:0 0 60px rgba(255,40,40,0.3)}
#menu h1 span{color:#ff3c3c}
#menu .subtitle{color:rgba(255,255,255,0.25);font-size:13px;letter-spacing:8px;margin-bottom:60px;font-family:'Orbitron',sans-serif}
.menu-btn{display:block;width:320px;margin:0 auto 16px;padding:16px 0;background:transparent;border:1px solid rgba(255,60,60,0.3);color:#fff;font-family:'Orbitron',sans-serif;font-size:14px;letter-spacing:4px;cursor:pointer;transition:all 0.3s ease;text-transform:uppercase}
.menu-btn:hover{background:rgba(255,60,60,0.1);border-color:#ff3c3c;box-shadow:0 0 30px rgba(255,60,60,0.15)}
.menu-info{color:rgba(255,255,255,0.2);font-size:12px;margin-top:40px;letter-spacing:2px;line-height:2}
.menu-info span{color:rgba(255,60,60,0.5)}
#settings-panel{position:fixed;inset:0;z-index:250;background:rgba(5,5,10,0.95);display:none;cursor:default;overflow-y:auto}
#settings-inner{max-width:600px;margin:40px auto;padding:40px}
#settings-panel h2{font-family:'Orbitron',sans-serif;font-size:32px;color:#fff;letter-spacing:6px;margin-bottom:8px;text-shadow:0 0 30px rgba(255,40,40,0.2)}
.settings-sub{color:rgba(255,255,255,0.25);font-size:11px;letter-spacing:4px;font-family:'Orbitron',sans-serif;margin-bottom:40px}
.settings-section{margin-bottom:36px}
.settings-section h3{font-family:'Orbitron',sans-serif;font-size:13px;color:#ff3c3c;letter-spacing:4px;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid rgba(255,60,60,0.15)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.setting-row label{color:rgba(255,255,255,0.6);font-size:14px;letter-spacing:1px;flex:1}
.sens-value{color:#ff3c3c;font-family:'Orbitron',sans-serif;font-size:13px;width:50px;text-align:right;margin-right:14px}
.setting-row input[type="range"]{width:200px;accent-color:#ff3c3c;cursor:pointer}
.keybind-btn{padding:8px 18px;min-width:120px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,60,60,0.25);color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all 0.2s;text-align:center;text-transform:uppercase}
.keybind-btn:hover{background:rgba(255,60,60,0.1);border-color:#ff3c3c}
.keybind-btn.listening{background:rgba(255,60,60,0.2);border-color:#ff3c3c;color:#ff3c3c;animation:pulse 0.8s infinite alternate}
@keyframes pulse{from{opacity:0.6}to{opacity:1}}
.settings-bottom{display:flex;gap:16px;justify-content:center;margin-top:40px}
.settings-bottom button{padding:14px 40px;background:transparent;border:1px solid rgba(255,60,60,0.3);color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;cursor:pointer;transition:all 0.3s}
.settings-bottom button:hover{background:rgba(255,60,60,0.1);border-color:#ff3c3c}
.reset-btn{border-color:rgba(255,255,255,0.15)!important}
.reset-btn:hover{border-color:rgba(255,255,255,0.4)!important;background:rgba(255,255,255,0.05)!important}
#death-screen{position:fixed;inset:0;z-index:150;background:rgba(10,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;cursor:default}
#death-screen h2{font-size:48px;color:#ff3c3c;letter-spacing:8px;margin-bottom:12px}
#death-screen p{color:rgba(255,255,255,0.4);font-size:13px;letter-spacing:4px}
.respawn-btn{margin-top:40px;padding:14px 50px;border:1px solid rgba(255,60,60,0.4);background:transparent;color:#fff;font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:4px;cursor:pointer;transition:all 0.3s}
.respawn-btn:hover{background:rgba(255,60,60,0.15);border-color:#ff3c3c}
#round-over{position:fixed;inset:0;z-index:160;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;cursor:default}
#round-over h2{font-size:52px;color:#fff;letter-spacing:8px;margin-bottom:8px}
.winner-text{color:#ff3c3c;font-size:16px;letter-spacing:5px;margin-bottom:40px}
.scores-summary{color:rgba(255,255,255,0.5);font-size:14px;letter-spacing:3px;margin-bottom:40px;line-height:2.2}
#hitmarker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;pointer-events:none;z-index:101;opacity:0;display:none}
#hitmarker::before,#hitmarker::after{content:'';position:absolute;background:#fff}
#hitmarker::before{width:2px;height:12px;left:14px;top:0;transform:rotate(45deg)}
#hitmarker::after{width:12px;height:2px;top:5px;left:3px;transform:rotate(45deg)}
.hitmarker-kill{filter:drop-shadow(0 0 4px #ff3c3c)}
.hitmarker-kill::before,.hitmarker-kill::after{background:#ff3c3c!important}
#minimap{position:fixed;top:20px;left:20px;width:150px;height:150px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,60,60,0.3);z-index:50;display:none}
#minimap canvas{width:100%;height:100%}
#pause-hint{position:fixed;top:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.15);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;z-index:55;display:none;pointer-events:none}
</style>
</head>
<body>
<div id="menu"><div id="menu-bg"></div><div id="menu-content">
<h1>KNIFE <span>ARENA</span></h1><div class="subtitle">CLOSE QUARTERS COMBAT</div>
<button class="menu-btn" onclick="startGame('duel')">DUEL — FIRST TO 5 KILLS</button>
<button class="menu-btn" onclick="startGame('ffa')">FREE FOR ALL</button>
<button class="menu-btn" onclick="openSettings()" style="margin-top:16px;border-color:rgba(255,255,255,0.15)">SETTINGS</button>
<div class="menu-info" id="menu-controls-info"></div></div></div>

<div id="settings-panel"><div id="settings-inner">
<h2>SETTINGS</h2><div class="settings-sub">CUSTOMIZE YOUR EXPERIENCE</div>
<div class="settings-section"><h3>SENSITIVITY</h3>
<div class="setting-row"><label>Mouse Sensitivity</label><span class="sens-value" id="sens-val">2.0</span>
<input type="range" id="sens-slider" min="0.5" max="10" step="0.1" value="2.0"></div></div>
<div class="settings-section"><h3>KEYBINDS</h3><div id="keybinds-container"></div></div>
<div class="settings-bottom"><button class="reset-btn" onclick="resetKeybinds()">RESET DEFAULTS</button>
<button onclick="closeSettings()">SAVE &amp; CLOSE</button></div></div></div>

<div id="crosshair"><div class="dot"></div></div>
<div id="hud"><div id="health-text">HEALTH</div><div id="health-bar-container"><div id="health-bar"></div></div>
<div id="backstab-cd-label">BACKSTAB READY</div><div id="backstab-cd-container"><div id="backstab-cd-bar"></div></div>
<div id="score-label">KILLS</div><div id="score-display">0</div><div id="weapon-name">COMBAT KNIFE</div></div>
<div id="kill-feed"></div><div id="damage-overlay"></div>
<div id="slide-indicator">SLIDING</div><div id="hitmarker"></div>
<div id="minimap"><canvas id="minimap-canvas" width="150" height="150"></canvas></div>
<div id="pause-hint">ESC — SETTINGS</div>
<div id="death-screen"><h2>ELIMINATED</h2><p id="death-by"></p><button class="respawn-btn" onclick="respawn()">RESPAWN</button></div>
<div id="round-over"><h2>ROUND OVER</h2><div class="winner-text" id="winner-text"></div>
<div class="scores-summary" id="scores-summary"></div><button class="menu-btn" onclick="backToMenu()">BACK TO MENU</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const DEFAULT_KEYBINDS={forward:{code:'KeyW',label:'Move Forward'},backward:{code:'KeyS',label:'Move Backward'},left:{code:'KeyA',label:'Move Left'},right:{code:'KeyD',label:'Move Right'},sprint:{code:'ShiftLeft',label:'Sprint'},crouch:{code:'KeyC',label:'Crouch / Slide'},jump:{code:'Space',label:'Jump'},slash:{code:'Mouse0',label:'Slash (LMB)'},backstab:{code:'Mouse2',label:'Backstab (RMB)'}};
let keybinds={},listeningFor=null;
function loadKeybinds(){try{const s=localStorage.getItem('ka_binds2');if(s){keybinds=JSON.parse(s);if(!keybinds.jump)keybinds.jump='Space';return;}}catch(e){}resetKeybindsData();}
function resetKeybindsData(){keybinds={};for(const[a,d]of Object.entries(DEFAULT_KEYBINDS))keybinds[a]=d.code;}
function resetKeybinds(){resetKeybindsData();saveKeybinds();buildKeybindRows();}
function saveKeybinds(){try{localStorage.setItem('ka_binds2',JSON.stringify(keybinds));}catch(e){}}
function codeToDisplay(c){if(c==='Mouse0')return'LMB';if(c==='Mouse1')return'MMB';if(c==='Mouse2')return'RMB';if(c.startsWith('Key'))return c.slice(3);if(c.startsWith('Digit'))return c.slice(5);if(c==='ShiftLeft'||c==='ShiftRight')return'SHIFT';if(c==='ControlLeft'||c==='ControlRight')return'CTRL';if(c==='AltLeft'||c==='AltRight')return'ALT';if(c==='Space')return'SPACE';return c.replace('Arrow','').toUpperCase();}
function buildKeybindRows(){const ct=document.getElementById('keybinds-container');ct.innerHTML='';for(const[action,def]of Object.entries(DEFAULT_KEYBINDS)){const r=document.createElement('div');r.className='setting-row';r.innerHTML='<label>'+def.label+'</label><button class="keybind-btn" data-action="'+action+'">'+codeToDisplay(keybinds[action])+'</button>';ct.appendChild(r);}ct.querySelectorAll('.keybind-btn').forEach(b=>b.addEventListener('click',()=>startListening(b)));}
function startListening(btn){document.querySelectorAll('.keybind-btn.listening').forEach(b=>{b.classList.remove('listening');b.textContent=codeToDisplay(keybinds[b.dataset.action]);});listeningFor=btn.dataset.action;btn.classList.add('listening');btn.textContent='PRESS KEY...';}
function finishListening(code){if(!listeningFor)return;keybinds[listeningFor]=code;saveKeybinds();const btn=document.querySelector('.keybind-btn[data-action="'+listeningFor+'"]');if(btn){btn.textContent=codeToDisplay(code);btn.classList.remove('listening');}listeningFor=null;updateMenuInfo();}

let settingsOpen=false,settingsFromGame=false;
function openSettings(){settingsOpen=true;settingsFromGame=gameActive;document.getElementById('settings-panel').style.display='block';buildKeybindRows();updateSensSlider();}
function closeSettings(){settingsOpen=false;listeningFor=null;document.getElementById('settings-panel').style.display='none';saveKeybinds();updateMenuInfo();if(settingsFromGame&&gameActive)renderer.domElement.requestPointerLock();}
function updateSensSlider(){document.getElementById('sens-slider').value=mouseSens/0.001;document.getElementById('sens-val').textContent=(mouseSens/0.001).toFixed(1);}
function updateMenuInfo(){document.getElementById('menu-controls-info').innerHTML='<span>'+codeToDisplay(keybinds.forward)+codeToDisplay(keybinds.left)+codeToDisplay(keybinds.backward)+codeToDisplay(keybinds.right)+'</span> MOVE &nbsp; <span>'+codeToDisplay(keybinds.slash)+'</span> SLASH &nbsp; <span>'+codeToDisplay(keybinds.backstab)+'</span> BACKSTAB &nbsp; <span>'+codeToDisplay(keybinds.sprint)+'</span> SPRINT<br><span>'+codeToDisplay(keybinds.crouch)+'</span> SLIDE &nbsp; <span>'+codeToDisplay(keybinds.jump)+'</span> JUMP &nbsp; <span>ESC</span> SETTINGS';}

let scene,camera,renderer,clock,enemies=[],moveState={forward:false,backward:false,left:false,right:false,sprint:false,crouch:false};
let mouseSens=0.002,yaw=0,pitch=0,isLocked=false,gameActive=false,gameMode='duel';
let playerHP=150,playerKills=0,playerDeaths=0,killTarget=5;
let knifeSwinging=false,knifeCD=0,backstabCD=0,backstabSwinging=false;
let arenaSize=40,respawnPoints=[],walls=[],wallBoxes=[],knifeGroup,knifeBlade,minimapCtx,ambientParticles=[];
let isSliding=false,slideTimer=0,slideDir;
// CHANGED: Faster slide — duration 0.8s, speed 26 (was 0.6 / 18)
const SLIDE_DURATION=0.8,SLIDE_SPEED=26,SLIDE_HEIGHT=0.9,NORMAL_HEIGHT=1.7;
let currentHeight=NORMAL_HEIGHT;

let velocityY=0,isGrounded=true;
const GRAVITY=22,JUMP_FORCE=9;
// ADDED: Bunny hop momentum system
let bhopMomentum=null,bhopTimer=0;
const BHOP_DURATION=0.5,BHOP_SPEED_BONUS=14;

const KNIFE_DAMAGE=40,BACKSTAB_DAMAGE=150,KNIFE_RANGE=3.5,BACKSTAB_RANGE=4.2;
const BACKSTAB_ANGLE=2.8;
const BACKSTAB_COOLDOWN=3.0;
const PLAYER_SPEED=8,SPRINT_MULT=1.5,PLAYER_HP=150;

function init(){
  loadKeybinds();updateMenuInfo();slideDir=new THREE.Vector3();bhopMomentum=new THREE.Vector3();
  scene=new THREE.Scene();scene.background=new THREE.Color(0x111118);scene.fog=new THREE.FogExp2(0x111118,0.018);
  camera=new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.1,200);camera.position.set(0,NORMAL_HEIGHT,0);
  renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=0.9;
  document.body.appendChild(renderer.domElement);clock=new THREE.Clock();
  minimapCtx=document.getElementById('minimap-canvas').getContext('2d');
  document.getElementById('sens-slider').addEventListener('input',e=>{mouseSens=parseFloat(e.target.value)*0.001;document.getElementById('sens-val').textContent=parseFloat(e.target.value).toFixed(1);});
  buildArena();buildKnifeViewModel();setupLights();createAmbientParticles();setupEvents();animate();
}

function buildArena(){
  const fm=new THREE.MeshStandardMaterial({color:0x1a1a22,roughness:0.85,metalness:0.1});
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(arenaSize*2,arenaSize*2),fm);fl.rotation.x=-Math.PI/2;fl.receiveShadow=true;scene.add(fl);
  scene.add(new THREE.GridHelper(arenaSize*2,40,0x252530,0x1e1e28));
  const wm=new THREE.MeshStandardMaterial({color:0x22222e,roughness:0.7,metalness:0.3}),wH=6;
  [{x:0,z:-arenaSize,ry:0},{x:0,z:arenaSize,ry:0},{x:-arenaSize,z:0,ry:Math.PI/2},{x:arenaSize,z:0,ry:Math.PI/2}].forEach(p=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(arenaSize*2,wH,0.5),wm);m.position.set(p.x,wH/2,p.z);m.rotation.y=p.ry;m.castShadow=true;m.receiveShadow=true;scene.add(m);});
  const oM=new THREE.MeshStandardMaterial({color:0x2a2a35,roughness:0.6,metalness:0.4});
  const oM2=new THREE.MeshStandardMaterial({color:0x33182a,roughness:0.5,metalness:0.5});
  const pM=new THREE.MeshStandardMaterial({color:0x3a2020,roughness:0.4,metalness:0.6});
  [{x:0,z:0,w:4,h:3,d:4,m:oM2},{x:-15,z:-15,w:6,h:2.5,d:2,m:oM},{x:15,z:15,w:6,h:2.5,d:2,m:oM},{x:-15,z:15,w:2,h:2.5,d:6,m:oM},{x:15,z:-15,w:2,h:2.5,d:6,m:oM},{x:-8,z:0,w:1,h:2,d:8,m:oM},{x:8,z:0,w:1,h:2,d:8,m:oM},{x:0,z:-10,w:8,h:2,d:1,m:oM},{x:0,z:10,w:8,h:2,d:1,m:oM},{x:-20,z:-5,w:2,h:2,d:2,m:oM2},{x:20,z:5,w:2,h:2,d:2,m:oM2},{x:-5,z:-20,w:2,h:2,d:2,m:oM2},{x:5,z:20,w:2,h:2,d:2,m:oM2},{x:-25,z:10,w:4,h:3,d:1.5,m:oM},{x:25,z:-10,w:4,h:3,d:1.5,m:oM},{x:10,z:-25,w:1.5,h:3,d:4,m:oM},{x:-10,z:25,w:1.5,h:3,d:4,m:oM}].forEach(o=>{
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(o.w,o.h,o.d),o.m);mesh.position.set(o.x,o.h/2,o.z);mesh.castShadow=true;mesh.receiveShadow=true;scene.add(mesh);walls.push(mesh);wallBoxes.push(new THREE.Box3().setFromObject(mesh));});
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,r=22;const m=new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.6,5,8),pM);m.position.set(Math.cos(a)*r,2.5,Math.sin(a)*r);m.castShadow=true;scene.add(m);walls.push(m);wallBoxes.push(new THREE.Box3().setFromObject(m));}
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(arenaSize*2,arenaSize*2),new THREE.MeshStandardMaterial({color:0x0e0e14,roughness:1}));ceil.rotation.x=Math.PI/2;ceil.position.y=6;scene.add(ceil);
  respawnPoints=[[-25,NORMAL_HEIGHT,-25],[25,NORMAL_HEIGHT,25],[-25,NORMAL_HEIGHT,25],[25,NORMAL_HEIGHT,-25],[0,NORMAL_HEIGHT,-25],[0,NORMAL_HEIGHT,25],[-25,NORMAL_HEIGHT,0],[25,NORMAL_HEIGHT,0]].map(p=>new THREE.Vector3(...p));
  const sM=new THREE.MeshStandardMaterial({color:0x660015,emissive:0x330008,roughness:0.9});
  for(let i=-3;i<=3;i++){const s=new THREE.Mesh(new THREE.PlaneGeometry(0.15,arenaSize*2),sM);s.rotation.x=-Math.PI/2;s.position.set(i*12,0.01,0);scene.add(s);}
}

function setupLights(){
  scene.add(new THREE.AmbientLight(0x333344,0.5));
  const d=new THREE.DirectionalLight(0xffeedd,0.4);d.position.set(10,20,10);d.castShadow=true;d.shadow.mapSize.set(1024,1024);d.shadow.camera.near=0.5;d.shadow.camera.far=60;d.shadow.camera.left=-40;d.shadow.camera.right=40;d.shadow.camera.top=40;d.shadow.camera.bottom=-40;scene.add(d);
  [[-20,4,-20],[20,4,20],[-20,4,20],[20,4,-20],[0,4,0]].forEach(p=>{const l=new THREE.PointLight(0xff2222,0.6,25);l.position.set(...p);scene.add(l);});
  [[-15,3,0],[15,3,0],[0,3,-15],[0,3,15]].forEach(p=>{const l=new THREE.PointLight(0x2244ff,0.3,18);l.position.set(...p);scene.add(l);});

class AIEnemy{
  constructor(id){this.id=id;this.hp=PLAYER_HP;this.kills=0;
    this.speed=3.5+Math.random()*1.5;
    this.alive=true;this.attackCD=0;this.state='patrol';this.stateTimer=0;
    this.patrolTarget=this.randomPoint();this.mesh=this.createMesh();
    this.facing=new THREE.Vector3(0,0,-1);this.respawnTimer=0;
    this.strafeDir=Math.random()>0.5?1:-1;this.strafeTimer=0;
    this.thinkCD=0;this.hesitateCD=0;
    const sp=respawnPoints[Math.floor(Math.random()*respawnPoints.length)];this.mesh.position.copy(sp);this.mesh.position.y=0;scene.add(this.mesh);}
  createMesh(){
    const g=new THREE.Group();const bm=new THREE.MeshStandardMaterial({color:0x882222,roughness:0.5,metalness:0.3});
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.7,1.2,0.5),bm);body.position.y=1.1;body.castShadow=true;g.add(body);
    const head=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.4),new THREE.MeshStandardMaterial({color:0xcc9977,roughness:0.6}));head.position.y=2.0;head.castShadow=true;g.add(head);
    const lm=new THREE.MeshStandardMaterial({color:0x333344,roughness:0.7}),lg=new THREE.BoxGeometry(0.25,0.7,0.3);
    const ll=new THREE.Mesh(lg,lm);ll.position.set(-0.18,0.35,0);g.add(ll);const lr=new THREE.Mesh(lg,lm);lr.position.set(0.18,0.35,0);g.add(lr);
    const am=new THREE.MeshStandardMaterial({color:0x882222,roughness:0.5}),ag=new THREE.BoxGeometry(0.2,0.8,0.2);
    const al=new THREE.Mesh(ag,am);al.position.set(-0.45,1.2,0);g.add(al);const ar=new THREE.Mesh(ag,am);ar.position.set(0.45,1.2,0);g.add(ar);this.rightArm=ar;
    const kn=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.04,0.3),new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.1,metalness:0.95}));kn.position.set(0.45,0.9,-0.2);g.add(kn);this.knifeMesh=kn;
    const bk=new THREE.Mesh(new THREE.BoxGeometry(0.68,0.5,0.05),new THREE.MeshStandardMaterial({color:0x661111,roughness:0.5}));bk.position.set(0,1.3,0.27);g.add(bk);
    return g;
  }
  randomPoint(){return new THREE.Vector3((Math.random()-0.5)*(arenaSize-4)*2,0,(Math.random()-0.5)*(arenaSize-4)*2);}
  distToPlayer(){return this.mesh.position.distanceTo(new THREE.Vector3(camera.position.x,0,camera.position.z));}
  update(dt){
    if(!this.alive){this.respawnTimer-=dt;if(this.respawnTimer<=0)this.respawn();return;}
    this.attackCD=Math.max(0,this.attackCD-dt);this.stateTimer-=dt;this.strafeTimer-=dt;
    this.thinkCD=Math.max(0,this.thinkCD-dt);this.hesitateCD=Math.max(0,this.hesitateCD-dt);
    const distP=this.distToPlayer(),toPlayer=new THREE.Vector3(camera.position.x,0,camera.position.z).sub(this.mesh.position).normalize();
    if(this.thinkCD<=0){
      this.thinkCD=0.8+Math.random()*0.7;
      if(distP<3.5&&this.attackCD<=0&&this.hesitateCD<=0){this.state='attack';}
      else if(distP<30){this.state='chase';}
      else if(this.stateTimer<=0){this.state='patrol';this.patrolTarget=this.randomPoint();this.stateTimer=4+Math.random()*5;}
    }
    let moveDir=new THREE.Vector3(),speed=this.speed;
    switch(this.state){
      case'patrol':moveDir.copy(this.patrolTarget).sub(this.mesh.position).normalize();if(this.mesh.position.distanceTo(this.patrolTarget)<2)this.patrolTarget=this.randomPoint();speed*=0.5;break;
      case'chase':{moveDir.copy(toPlayer);if(distP<6){if(this.strafeTimer<=0){this.strafeDir*=-1;this.strafeTimer=2+Math.random()*3;}const st=new THREE.Vector3(-toPlayer.z,0,toPlayer.x).multiplyScalar(this.strafeDir*0.25);moveDir.add(st).normalize();}break;}
      case'attack':moveDir.copy(toPlayer);if(distP<KNIFE_RANGE&&this.attackCD<=0){if(this.hesitateCD<=0){this.hesitateCD=0.3+Math.random()*0.5;this.performAttack();}}if(distP>5)this.state='chase';break;
    }
    moveDir.y=0;if(moveDir.length()>0){moveDir.normalize();this.facing.lerp(moveDir,dt*3);this.facing.normalize();
      const np=this.mesh.position.clone().add(moveDir.clone().multiplyScalar(speed*dt));np.x=Math.max(-arenaSize+1,Math.min(arenaSize-1,np.x));np.z=Math.max(-arenaSize+1,Math.min(arenaSize-1,np.z));
      const tb=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(np.x,1,np.z),new THREE.Vector3(0.8,2,0.8));let bl=false;for(const w of wallBoxes)if(tb.intersectsBox(w)){bl=true;break;}
      if(!bl)this.mesh.position.copy(np);else{const sx=this.mesh.position.clone();sx.x=np.x;const tbx=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(sx.x,1,sx.z),new THREE.Vector3(0.8,2,0.8));let bx=false;for(const w of wallBoxes)if(tbx.intersectsBox(w)){bx=true;break;}if(!bx)this.mesh.position.x=np.x;const sz=this.mesh.position.clone();sz.z=np.z;const tbz=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(sz.x,1,sz.z),new THREE.Vector3(0.8,2,0.8));let bz=false;for(const w of wallBoxes)if(tbz.intersectsBox(w)){bz=true;break;}if(!bz)this.mesh.position.z=np.z;}
      this.mesh.rotation.y=Math.atan2(this.facing.x,this.facing.z);
    }
    if(this.attackCD>0.5){this.rightArm.rotation.x=-Math.PI/2;this.knifeMesh.position.z=-0.5;}else{this.rightArm.rotation.x=0;this.knifeMesh.position.z=-0.2;}
    const bs2=speed>3?8:4;this.mesh.children.forEach((c,i)=>{if(i===3||i===4)c.position.y=0.35+Math.sin(clock.elapsedTime*bs2+i)*0.08;});
  }
  performAttack(){this.attackCD=2.0+Math.random()*1.0;if(this.distToPlayer()>KNIFE_RANGE+0.5)return;takeDamage(KNIFE_DAMAGE,this,false);}
  takeDamageFromPlayer(amt,bs2=false){if(!this.alive)return;this.hp-=amt;this.mesh.children[0].material.emissive.setHex(0xff0000);setTimeout(()=>{if(this.mesh.children[0])this.mesh.children[0].material.emissive.setHex(0);},100);if(this.hp<=0)this.die(bs2);}
  die(bs2){this.alive=false;this.mesh.visible=false;this.respawnTimer=3;playerKills++;updateHUD();addKillFeed(bs2?'YOU <span class="backstab">BACKSTABBED</span> ENEMY '+this.id:'YOU → ENEMY '+this.id);showHitmarker(true);checkRoundOver();}
  respawn(){this.alive=true;this.hp=PLAYER_HP;const sp=respawnPoints[Math.floor(Math.random()*respawnPoints.length)];this.mesh.position.set(sp.x,0,sp.z);this.mesh.visible=true;this.state='patrol';this.patrolTarget=this.randomPoint();this.thinkCD=1+Math.random();}
}

function takeDamage(amt,attacker,bs2){if(!gameActive)return;playerHP-=amt;const ov=document.getElementById('damage-overlay');ov.style.border='8px solid rgba(255,0,0,0.6)';setTimeout(()=>ov.style.border='0px solid rgba(255,0,0,0)',300);if(bs2)addKillFeed('ENEMY '+attacker.id+' <span class="backstab">BACKSTABBED</span> YOU');if(playerHP<=0){playerHP=0;playerDie(attacker,bs2);}updateHUD();}
function playerDie(att,bs2){gameActive=false;playerDeaths++;if(att)att.kills++;document.getElementById('death-screen').style.display='flex';document.getElementById('death-by').textContent=att?(bs2?'BACKSTABBED':'KILLED')+' BY ENEMY '+att.id:'ELIMINATED';if(document.pointerLockElement)document.exitPointerLock();checkRoundOver();}
function respawn(){document.getElementById('death-screen').style.display='none';playerHP=PLAYER_HP;isSliding=false;slideTimer=0;currentHeight=NORMAL_HEIGHT;velocityY=0;isGrounded=true;bhopTimer=0;const sp=respawnPoints[Math.floor(Math.random()*respawnPoints.length)];camera.position.set(sp.x,NORMAL_HEIGHT,sp.z);yaw=Math.random()*Math.PI*2;pitch=0;updateHUD();renderer.domElement.requestPointerLock();gameActive=true;}
function checkRoundOver(){if(gameMode==='duel'){if(playerKills>=killTarget)return showRoundOver('YOU WIN!');for(const e of enemies)if(e.kills>=killTarget)return showRoundOver('ENEMY '+e.id+' WINS');}}
function showRoundOver(w){gameActive=false;if(document.pointerLockElement)document.exitPointerLock();document.getElementById('death-screen').style.display='none';document.getElementById('round-over').style.display='flex';document.getElementById('winner-text').textContent=w;let s='YOU: '+playerKills+' KILLS / '+playerDeaths+' DEATHS\n';enemies.forEach(e=>{s+='ENEMY '+e.id+': '+e.kills+' KILLS\n';});document.getElementById('scores-summary').textContent=s;}
function backToMenu(){document.getElementById('round-over').style.display='none';document.getElementById('menu').style.display='flex';['hud','crosshair','kill-feed','minimap','slide-indicator','pause-hint'].forEach(id=>document.getElementById(id).style.display='none');enemies.forEach(e=>scene.remove(e.mesh));enemies=[];gameActive=false;}

function knifeSlash(){
  if(knifeCD>0||!gameActive||isSliding)return;knifeCD=0.5;knifeSwinging=true;backstabSwinging=false;setTimeout(()=>{knifeSwinging=false;},300);
  const cp=camera.position.clone(),cd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
  for(const e of enemies){if(!e.alive)continue;const ec=e.mesh.position.clone();ec.y=1.2;const te=ec.sub(cp);const dist=te.length();te.normalize();if(dist>KNIFE_RANGE+0.5||cd.dot(te)<0.5)continue;e.takeDamageFromPlayer(KNIFE_DAMAGE,false);showHitmarker(e.hp<=0);break;}
}

function knifeBackstab(){
  if(backstabCD>0||!gameActive||isSliding)return;backstabCD=BACKSTAB_COOLDOWN;backstabSwinging=true;knifeSwinging=true;setTimeout(()=>{knifeSwinging=false;backstabSwinging=false;},400);
  const cp=camera.position.clone(),cd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
  for(const e of enemies){if(!e.alive)continue;const ec=e.mesh.position.clone();ec.y=1.2;const te=ec.sub(cp);const dist=te.length();te.normalize();
    if(dist>BACKSTAB_RANGE+1.0||cd.dot(te)<0.3)continue;
    const ef=e.facing.clone().normalize(),ad=cd.clone();ad.y=0;ad.normalize();const bd=ef.dot(ad);
    const isBS=bd>Math.cos(BACKSTAB_ANGLE/2);
    e.takeDamageFromPlayer(isBS?BACKSTAB_DAMAGE:KNIFE_DAMAGE,isBS);if(!isBS)showHitmarker(e.hp<=0);break;}
}

function showHitmarker(kill){const h=document.getElementById('hitmarker');h.style.display='block';h.style.opacity=1;h.className=kill?'hitmarker-kill':'';setTimeout(()=>{h.style.opacity=0;},150);setTimeout(()=>{h.style.display='none';},200);}
function updateHUD(){const p=Math.max(0,playerHP/PLAYER_HP*100);document.getElementById('health-bar').style.width=p+'%';document.getElementById('health-text').textContent='HEALTH '+Math.round(playerHP)+'/'+PLAYER_HP;document.getElementById('score-display').textContent=playerKills;document.getElementById('health-bar').style.background=p<30?'linear-gradient(90deg,#ff0000,#cc0000)':'linear-gradient(90deg,#ff1a1a,#ff4444)';}
function updateBackstabCDBar(){const p=Math.max(0,1-backstabCD/BACKSTAB_COOLDOWN)*100;document.getElementById('backstab-cd-bar').style.width=p+'%';document.getElementById('backstab-cd-bar').style.background=p>=100?'linear-gradient(90deg,#aa44ff,#dd66ff)':'linear-gradient(90deg,#553388,#774499)';document.getElementById('backstab-cd-label').textContent=backstabCD>0?'BACKSTAB '+backstabCD.toFixed(1)+'s':'BACKSTAB READY';}

function drawMinimap(){
  const ctx=minimapCtx,w=150;ctx.clearRect(0,0,w,w);ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,w,w);const sc=w/(arenaSize*2);
  ctx.fillStyle='rgba(60,60,80,0.5)';walls.forEach(wall=>{const b=new THREE.Box3().setFromObject(wall);const cx=(b.min.x+b.max.x)/2,cz=(b.min.z+b.max.z)/2,sx=b.max.x-b.min.x,sz=b.max.z-b.min.z;ctx.fillRect((cx+arenaSize)*sc-sx*sc/2,(cz+arenaSize)*sc-sz*sc/2,sx*sc,sz*sc);});
  const px=(camera.position.x+arenaSize)*sc,pz=(camera.position.z+arenaSize)*sc;ctx.fillStyle=isSliding?'#44aaff':(bhopTimer>0?'#ffaa00':'#00ff44');ctx.beginPath();ctx.arc(px,pz,3,0,Math.PI*2);ctx.fill();
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);ctx.strokeStyle='#00ff44';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px,pz);ctx.lineTo(px+dir.x*10,pz+dir.z*10);ctx.stroke();
  enemies.forEach(e=>{if(!e.alive)return;const ex=(e.mesh.position.x+arenaSize)*sc,ez=(e.mesh.position.z+arenaSize)*sc;ctx.fillStyle='#ff3333';ctx.beginPath();ctx.arc(ex,ez,3,0,Math.PI*2);ctx.fill();});
}

function trySlide(){if(isSliding||!moveState.sprint||!gameActive||!isGrounded)return;const f=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);f.y=0;f.normalize();isSliding=true;slideTimer=SLIDE_DURATION;slideDir.copy(f);}

// CHANGED: tryJump now supports bunny hopping — jump while sliding to launch with momentum
function tryJump(){
  if(!gameActive)return;
  if(isSliding){
    // BUNNY HOP: cancel slide, keep slide direction as momentum, jump higher
    bhopMomentum.copy(slideDir).normalize();
    bhopTimer=BHOP_DURATION;
    isSliding=false;slideTimer=0;
    currentHeight=NORMAL_HEIGHT;
    velocityY=JUMP_FORCE*1.15; // slightly boosted jump
    isGrounded=false;
    return;
  }
  if(!isGrounded)return;
  velocityY=JUMP_FORCE;isGrounded=false;
}

function updateSlide(dt){
  const si=document.getElementById('slide-indicator');
  if(!isSliding){si.style.opacity='0';return;}
  slideTimer-=dt;si.style.opacity='1';if(slideTimer<=0){isSliding=false;return;}
  const t=slideTimer/SLIDE_DURATION,spd=SLIDE_SPEED*t;currentHeight+=(SLIDE_HEIGHT-currentHeight)*Math.min(1,dt*20);
  const mv=slideDir.clone().multiplyScalar(spd*dt),np=camera.position.clone().add(mv);np.y=currentHeight;np.x=Math.max(-arenaSize+0.8,Math.min(arenaSize-0.8,np.x));np.z=Math.max(-arenaSize+0.8,Math.min(arenaSize-0.8,np.z));
  const tb=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(np.x,0.5,np.z),new THREE.Vector3(0.8,1,0.8));let bl=false;for(const w of wallBoxes)if(tb.intersectsBox(w)){bl=true;break;}
  if(!bl){camera.position.x=np.x;camera.position.z=np.z;}else isSliding=false;
}

function setupEvents(){
  function getAction(code){for(const[a,b]of Object.entries(keybinds))if(b===code)return a;return null;}
  document.addEventListener('keydown',e=>{
    if(listeningFor&&settingsOpen){if(e.code==='Escape'){const b=document.querySelector('.keybind-btn[data-action="'+listeningFor+'"]');if(b){b.textContent=codeToDisplay(keybinds[listeningFor]);b.classList.remove('listening');}listeningFor=null;return;}finishListening(e.code);e.preventDefault();return;}
    if(e.code==='Escape'){if(settingsOpen)closeSettings();else if(gameActive){if(document.pointerLockElement)document.exitPointerLock();openSettings();}return;}
    if(settingsOpen)return;const a=getAction(e.code);if(!a)return;
    switch(a){case'forward':moveState.forward=true;break;case'backward':moveState.backward=true;break;case'left':moveState.left=true;break;case'right':moveState.right=true;break;case'sprint':moveState.sprint=true;break;case'crouch':moveState.crouch=true;trySlide();break;case'jump':tryJump();break;}
  });
  document.addEventListener('keyup',e=>{if(settingsOpen)return;const a=getAction(e.code);if(!a)return;switch(a){case'forward':moveState.forward=false;break;case'backward':moveState.backward=false;break;case'left':moveState.left=false;break;case'right':moveState.right=false;break;case'sprint':moveState.sprint=false;break;case'crouch':moveState.crouch=false;break;}});
  document.addEventListener('mousemove',e=>{if(!isLocked||settingsOpen)return;yaw-=e.movementX*mouseSens;pitch-=e.movementY*mouseSens;pitch=Math.max(-Math.PI/2+0.1,Math.min(Math.PI/2-0.1,pitch));});
  document.addEventListener('mousedown',e=>{
    if(settingsOpen){if(listeningFor){finishListening('Mouse'+e.button);e.preventDefault();}return;}
    if(!isLocked)return;const code='Mouse'+e.button;
    for(const[a,b]of Object.entries(keybinds)){if(b===code){if(a==='slash')knifeSlash();else if(a==='backstab')knifeBackstab();else if(a==='crouch'){moveState.crouch=true;trySlide();}else if(a==='jump')tryJump();}}
  });
  document.addEventListener('mouseup',e=>{if(settingsOpen)return;const code='Mouse'+e.button;for(const[a,b]of Object.entries(keybinds))if(b===code&&a==='crouch')moveState.crouch=false;});
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('pointerlockchange',()=>{isLocked=!!document.pointerLockElement;});
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
}

function startGame(mode){
  gameMode=mode;killTarget=mode==='duel'?5:999;playerKills=0;playerDeaths=0;playerHP=PLAYER_HP;backstabCD=0;isSliding=false;slideTimer=0;currentHeight=NORMAL_HEIGHT;velocityY=0;isGrounded=true;bhopTimer=0;
  enemies.forEach(e=>scene.remove(e.mesh));enemies=[];const n=mode==='duel'?1:3;for(let i=1;i<=n;i++)enemies.push(new AIEnemy(i));
  const sp=respawnPoints[0];camera.position.set(sp.x,NORMAL_HEIGHT,sp.z);yaw=0;pitch=0;
  document.getElementById('menu').style.display='none';
  ['hud','crosshair','kill-feed','minimap','slide-indicator','pause-hint'].forEach(id=>document.getElementById(id).style.display='block');
  document.getElementById('death-screen').style.display='none';document.getElementById('round-over').style.display='none';
  updateHUD();renderer.domElement.requestPointerLock();gameActive=true;
}

function updatePlayer(dt){
  if(!gameActive||!isLocked)return;
  camera.quaternion.setFromEuler(new THREE.Euler(pitch,yaw,0,'YXZ'));
  backstabCD=Math.max(0,backstabCD-dt);updateBackstabCDBar();

  // === JUMP PHYSICS ===
  if(!isSliding){
    velocityY-=GRAVITY*dt;
    currentHeight+=velocityY*dt;
    if(currentHeight<=NORMAL_HEIGHT){currentHeight=NORMAL_HEIGHT;velocityY=0;isGrounded=true;}
    else{isGrounded=false;}
    if(currentHeight>5.5){currentHeight=5.5;velocityY=0;}
  }

  // === BUNNY HOP MOMENTUM — carries slide speed into the air ===
  bhopTimer=Math.max(0,bhopTimer-dt);
  if(bhopTimer>0&&!isSliding){
    const bhopSpd=BHOP_SPEED_BONUS*(bhopTimer/BHOP_DURATION);
    const mv=bhopMomentum.clone().multiplyScalar(bhopSpd*dt);
    const np=camera.position.clone().add(mv);
    np.x=Math.max(-arenaSize+0.8,Math.min(arenaSize-0.8,np.x));
    np.z=Math.max(-arenaSize+0.8,Math.min(arenaSize-0.8,np.z));
    const tb=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(np.x,1,np.z),new THREE.Vector3(0.8,2,0.8));
    let bl=false;for(const w of wallBoxes)if(tb.intersectsBox(w)){bl=true;break;}
    if(!bl){camera.position.x=np.x;camera.position.z=np.z;}else{bhopTimer=0;}
  }

  updateSlide(dt);
  if(isSliding){camera.position.y=currentHeight;knifeCD=Math.max(0,knifeCD-dt);return;}

  const speed=PLAYER_SPEED*(moveState.sprint?SPRINT_MULT:1);
  const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);fwd.y=0;fwd.normalize();
  const rt=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);rt.y=0;rt.normalize();
  const md=new THREE.Vector3();if(moveState.forward)md.add(fwd);if(moveState.backward)md.sub(fwd);if(moveState.right)md.add(rt);if(moveState.left)md.sub(rt);
  if(md.length()>0){md.normalize().multiplyScalar(speed*dt);const np=camera.position.clone().add(md);np.y=currentHeight;np.x=Math.max(-arenaSize+0.8,Math.min(arenaSize-0.8,np.x));np.z=Math.max(-arenaSize+0.8,Math.min(arenaSize-0.8,np.z));
    const tb=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(np.x,1,np.z),new THREE.Vector3(0.8,2,0.8));let bl=false;for(const w of wallBoxes)if(tb.intersectsBox(w)){bl=true;break;}
    if(!bl)camera.position.copy(np);else{const sx=camera.position.clone();sx.x=np.x;sx.y=1;const tbx=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(sx.x,1,sx.z),new THREE.Vector3(0.8,2,0.8));let bx=false;for(const w of wallBoxes)if(tbx.intersectsBox(w)){bx=true;break;}if(!bx)camera.position.x=np.x;const sz=camera.position.clone();sz.z=np.z;sz.y=1;const tbz=new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(sz.x,1,sz.z),new THREE.Vector3(0.8,2,0.8));let bz=false;for(const w of wallBoxes)if(tbz.intersectsBox(w)){bz=true;break;}if(!bz)camera.position.z=np.z;}}
  camera.position.y=currentHeight;
  if(md.length()>0&&isGrounded&&!isSliding){const bf=moveState.sprint?14:10,ba=moveState.sprint?0.04:0.025;camera.position.y=currentHeight+Math.sin(clock.elapsedTime*bf)*ba;}
  knifeCD=Math.max(0,knifeCD-dt);
}

function animateKnife(){
  if(!knifeGroup)return;const bp=new THREE.Vector3(0.35,-0.3,-0.5),br=new THREE.Euler(0.1,-0.3,0);
  if(isSliding){knifeGroup.position.set(0.3,-0.45,-0.4);knifeGroup.rotation.set(0.5,-0.1,-0.2);return;}
  if(knifeSwinging){
    if(backstabSwinging){const t=Math.min(1,(BACKSTAB_COOLDOWN-backstabCD)/0.4);knifeGroup.position.set(bp.x-0.1,bp.y+0.05*Math.sin(t*Math.PI),bp.z-0.25*Math.sin(t*Math.PI));knifeGroup.rotation.set(br.x+0.3*Math.sin(t*Math.PI),br.y,br.z);}
    else{const t=1-knifeCD/0.5;knifeGroup.position.set(bp.x-0.2*t,bp.y+0.1*Math.sin(t*Math.PI),bp.z+0.15*t);knifeGroup.rotation.set(br.x-0.5*t,br.y+1.2*t,br.z-0.3*t);}
  }else{const sw=Math.sin(clock.elapsedTime*2)*0.008,bo=Math.sin(clock.elapsedTime*1.5)*0.005;knifeGroup.position.set(bp.x+sw,bp.y+bo,bp.z);knifeGroup.rotation.copy(br);}
}

function animate(){
  requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);
  updatePlayer(dt);animateKnife();enemies.forEach(e=>e.update(dt));drawMinimap();
  ambientParticles.forEach(p=>{const pos=p.geometry.attributes.position;for(let i=0;i<pos.count;i++){pos.array[i*3+1]+=Math.sin(clock.elapsedTime+i)*0.002;if(pos.array[i*3+1]>5)pos.array[i*3+1]=0;}pos.needsUpdate=true;});
  renderer.render(scene,camera);
}

init();
</script>
